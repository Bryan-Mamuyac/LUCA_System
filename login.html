<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Luca System — Log In</title>
  <link rel="icon" type="img/png" href="logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="auth.css">
</head>
<body>

<canvas id="bgCanvas"></canvas>

<!-- Dark mode toggle -->
<button class="theme-toggle" id="themeToggle" title="Toggle dark mode">
  <i class="fa-solid fa-moon" id="themeIcon"></i>
</button>

<div class="auth-wrapper">
  <div class="auth-card">

    <!-- Logo -->
    <div class="auth-logo">
      <img src="logo.png" alt="Luca Logo" onerror="this.style.display='none'">
      <div class="auth-logo-text">
        <span class="auth-logo-name">Luca System</span>
        <span class="auth-logo-sub">Double Entry Book Keeping</span>
      </div>
    </div>

    <div class="auth-divider"></div>

    <div class="auth-badge">Welcome Back</div>
    <h1 class="auth-title">Log in to your account</h1>
    <p class="auth-subtitle">Enter your credentials to access your ledger.</p>

    <!-- Error / Success banners -->
    <div id="errorBanner" class="auth-banner error" style="display:none;"></div>
    <div id="successBanner" class="auth-banner success" style="display:none;"></div>

    <!-- Form -->
    <form id="loginForm" onsubmit="handleLogin(event)" novalidate>

      <div class="form-group">
        <label for="username"><i class="fa-solid fa-user"></i> Username</label>
        <div class="input-wrap">
          <input type="text" id="username" name="username"
                 placeholder="Enter your username"
                 autocomplete="username" required>
        </div>
        <span class="field-error" id="usernameErr"></span>
      </div>

      <div class="form-group">
        <label for="password"><i class="fa-solid fa-lock"></i> Password</label>
        <div class="input-wrap">
          <input type="password" id="password" name="password"
                 placeholder="Enter your password"
                 autocomplete="current-password" required>
          <button type="button" class="toggle-pw" onclick="togglePassword('password', this)">
            <i class="fa-solid fa-eye"></i>
          </button>
        </div>
        <span class="field-error" id="passwordErr"></span>
      </div>

      <button type="submit" class="btn-auth" id="submitBtn">
        <i class="fa-solid fa-right-to-bracket"></i>
        <span>Log In</span>
        <span class="btn-spinner" id="spinner" style="display:none;"><i class="fa-solid fa-spinner fa-spin"></i></span>
      </button>

    </form>

    <p class="auth-switch">
      Don't have an account?
      <a href="register.html">Create one <i class="fa-solid fa-arrow-right"></i></a>
    </p>

  </div>
</div>

<script src="canvas.js" defer></script>
<script>
  // ---- Theme ----
  (function() {
    const saved = localStorage.getItem('luca_theme') || 'light';
    document.documentElement.setAttribute('data-theme', saved);
    updateThemeIcon(saved);
  })();

  function updateThemeIcon(theme) {
    const icon = document.getElementById('themeIcon');
    if (!icon) return;
    icon.className = theme === 'dark' ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
  }

  document.getElementById('themeToggle').addEventListener('click', () => {
    const current = document.documentElement.getAttribute('data-theme');
    const next = current === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('luca_theme', next);
    updateThemeIcon(next);
  });

  // ---- Already logged in? ----
  (function() {
    const token = localStorage.getItem('luca_token');
    if (token) {
      fetch('/api/verify', {
        headers: { 'Authorization': `Bearer ${token}` }
      }).then(r => {
        if (r.ok) window.location.href = 'index.html';
      }).catch(() => {});
    }
  })();

  // ---- Toggle password visibility ----
  function togglePassword(inputId, btn) {
    const input = document.getElementById(inputId);
    const icon = btn.querySelector('i');
    if (input.type === 'password') {
      input.type = 'text';
      icon.className = 'fa-solid fa-eye-slash';
    } else {
      input.type = 'password';
      icon.className = 'fa-solid fa-eye';
    }
  }

  // ---- Show/hide banners ----
  function showError(msg) {
    const el = document.getElementById('errorBanner');
    el.innerHTML = `<i class="fa-solid fa-triangle-exclamation"></i> ${msg}`;
    el.style.display = 'flex';
    document.getElementById('successBanner').style.display = 'none';
  }

  function showSuccess(msg) {
    const el = document.getElementById('successBanner');
    el.innerHTML = `<i class="fa-solid fa-check-circle"></i> ${msg}`;
    el.style.display = 'flex';
    document.getElementById('errorBanner').style.display = 'none';
  }

  function clearBanners() {
    document.getElementById('errorBanner').style.display = 'none';
    document.getElementById('successBanner').style.display = 'none';
  }

  // ---- Form submit ----
  async function handleLogin(e) {
    e.preventDefault();
    clearBanners();

    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;

    // Client-side validation
    let valid = true;
    document.getElementById('usernameErr').textContent = '';
    document.getElementById('passwordErr').textContent = '';

    if (!username) {
      document.getElementById('usernameErr').textContent = 'Username is required.';
      valid = false;
    }
    if (!password) {
      document.getElementById('passwordErr').textContent = 'Password is required.';
      valid = false;
    }
    if (!valid) return;

    // Set loading state
    const btn = document.getElementById('submitBtn');
    const spinner = document.getElementById('spinner');
    btn.disabled = true;
    spinner.style.display = 'inline';

    try {
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password }),
      });

      const data = await res.json();

      if (!res.ok) {
        showError(data.error || 'Login failed. Please try again.');
        return;
      }

      // Store token + user info
      localStorage.setItem('luca_token', data.token);
      localStorage.setItem('luca_user', JSON.stringify(data.user));

      showSuccess('Logged in! Redirecting...');
      setTimeout(() => { window.location.href = 'index.html'; }, 900);

    } catch (err) {
      showError('Network error. Check your connection and try again.');
    } finally {
      btn.disabled = false;
      spinner.style.display = 'none';
    }
  }
</script>
</body>
</html>
